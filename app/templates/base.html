<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <span class="logo">💰 Track Your Finances</span>
        <nav><a href="{{ url_for('main.home') }}">Home</a>        
        <a href="{{ url_for('main.get_transaction') }}">Transaction</a>
        <a href="{{ url_for('main.summary') }}">Summary</a>
        <a href="{{ url_for('main.export_csv') }}">Export</a>
        </nav>
    </header>
    {% with messages=get_flashed_messages(with_categories=True) %}
    {% if messages %}
        {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
    {% endif %}
{% endwith %}

    {% block content %}
{% endblock %}
</body>
</html>
